<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gastos Personales Web</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="shortcut icon" href="./assets/favicon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="./src/main.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">$</div>
          <div>
            <strong>Gastos Personales</strong>
            <span>Presupuesto 80/20</span>
          </div>
        </div>
        <nav class="nav" aria-label="Principal">
          <button class="nav-link active" data-route="dashboard">Dashboard</button>
          <button class="nav-link" data-route="expenses">Gastos</button>
          <button class="nav-link" data-route="income">Ingresos</button>
          <button class="nav-link" data-route="savings">Ahorros</button>
          <button class="nav-link" data-route="reports">Reportes</button>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Gestion financiera local</p>
            <h1 id="view-title">Dashboard</h1>
          </div>
          <div class="month-controls">
            <button class="icon-button" id="previous-month" title="Mes anterior">&lt;</button>
            <input id="month-picker" type="month" />
            <button class="icon-button" id="next-month" title="Mes siguiente">&gt;</button>
          </div>
        </header>

        <section id="alert-area" class="alert-area"></section>
        <section id="app-view"></section>
      </main>
    </div>
  </body>
</html>
